name: Unit Tests & Coverage

on:
  workflow_dispatch:
  push:

jobs:
  test:
    runs-on: ubuntu-slim
    strategy:
      matrix:
        go: [ 
          'stable', 
          '^1.26', 
          '^1.25', 
          '^1.24', 
          '^1.23', 
          '^1.22', 
          '^1.21', 
          '^1.20', 
          '^1.19', 
          '~1.18', 
          '~1.17',
          '~1.16',
          '~1.15',
          '~1.14',
          '~1.13',
          '~1.12'
        ]
    name: Go ${{ matrix.go }} sample
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
    
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
  
      - name: Run Race tests
        run: |
          go test --race

  coverage:
    runs-on: ubuntu-slim
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
    
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"

      - name: Run tests with Coverage report
        run: |
          go test -coverprofile=coverage.txt -covermode=atomic

      - name: Upload coverage report
        uses: codecov/codecov-action@v6
        with:
          file: ./coverage.txt
